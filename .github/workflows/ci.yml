# =============================================================================
# CI 파이프라인: 코드 푸시 → 린트 → 테스트 → 보안스캔 → 빌드 → 푸시
#
# 이 파일이 GitHub Actions의 워크플로우 정의다.
# .github/workflows/ 디렉토리에 YAML 파일을 넣으면 GitHub가 자동 인식한다.
#
# 핵심 개념:
# - trigger (on): 어떤 이벤트에 실행할 것인가
# - jobs: 병렬로 실행되는 작업 단위
# - steps: job 안에서 순차로 실행되는 단계
# - actions: 재사용 가능한 스텝 (actions/checkout 등)
#
# 로컬에서 테스트하려면 'act' 도구를 사용한다:
#   brew install act
#   act push                          # push 이벤트 시뮬레이션
#   act -j build                      # 특정 job만 실행
#   act --secret-file .env.secrets    # 시크릿 전달
# =============================================================================
name: CI Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: 언제 이 파이프라인이 실행되는가
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"          # 문서 변경은 빌드 안 함
      - "blogs/**"
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# 환경변수: 모든 job에서 공유
# ─────────────────────────────────────────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/dashboard

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # =========================================================================
  # Job 1: 린트 + 테스트
  # 코드 품질을 먼저 검증한다. 여기서 실패하면 나머지 job은 실행되지 않는다.
  # =========================================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      # 코드 체크아웃: Git에서 소스를 가져온다
      - uses: actions/checkout@v4

      # Node.js 설정: .nvmrc 또는 package.json의 engines를 참조
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # 의존성 설치: ci는 package-lock.json을 정확히 따른다 (install과 다름)
      - run: npm ci

      # ESLint: 코드 스타일과 잠재적 버그를 검사
      - name: Lint
        run: npm run lint

      # 빌드 검증
      - name: Build
        run: npm run build

  # =========================================================================
  # Job 2: 보안 스캔 (Trivy)
  # 빌드된 이미지의 취약점을 검사한다.
  #
  # Trivy는 다음을 스캔한다:
  # - OS 패키지 취약점 (CVE)
  # - 언어별 의존성 취약점 (npm, pip 등)
  # - 설정 오류 (Dockerfile, K8s 매니페스트)
  #
  # severity 설정:
  # - CRITICAL: 원격 코드 실행 등 즉시 패치 필요
  # - HIGH: 중요한 취약점, 조기 패치 권장
  # - MEDIUM/LOW: 인지하되 급하지 않음
  # =========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test      # lint-and-test 성공 후에만 실행

    steps:
      - uses: actions/checkout@v4

      # Dockerfile 자체의 보안 문제를 스캔한다 (이미지 빌드 전)
      - name: Trivy - Dockerfile 스캔
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: dashboard/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 1          # 취약점 발견 시 파이프라인 실패

      # K8s 매니페스트의 보안 설정을 스캔한다
      - name: Trivy - K8s 매니페스트 스캔
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: kubernetes/
          severity: CRITICAL,HIGH
          exit-code: 0          # 경고만 (매니페스트는 차단하지 않음)

      # Docker 이미지 빌드 후 취약점 스캔
      - name: Docker 이미지 빌드
        run: docker build -t ${{ env.IMAGE_NAME }}:scan dashboard/

      - name: Trivy - 이미지 취약점 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  # =========================================================================
  # Job 3: 빌드 + 푸시
  # 보안 검증을 통과한 이미지를 레지스트리에 올린다.
  # =========================================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write          # GHCR(GitHub Container Registry)에 푸시 권한

    steps:
      - uses: actions/checkout@v4

      # GHCR 로그인
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 메타데이터 생성 (태그, 라벨)
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      # 멀티 아키텍처 빌드 + 푸시
      - uses: docker/build-push-action@v5
        with:
          context: dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # =========================================================================
  # Job 4: ArgoCD 동기화 트리거 (선택사항)
  # main에 머지되면 ArgoCD에 동기화를 요청한다.
  # ArgoCD가 Git 폴링으로 감지하므로 보통은 불필요하지만,
  # 즉시 반영이 필요할 때 사용한다.
  # =========================================================================
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: ArgoCD 동기화 요청 안내
        run: |
          echo "ArgoCD가 Git 변경을 감지하여 자동 동기화합니다."
          echo "수동 동기화가 필요하면:"
          echo "  argocd app sync dashboard"
          echo "  또는 ArgoCD UI에서 Sync 버튼 클릭"
