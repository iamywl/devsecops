# =============================================================================
# Nginx 설정
#
# SPA(Single Page Application)를 서빙하기 위한 설정이다.
# React Router 등 클라이언트 사이드 라우팅을 사용할 때,
# 모든 경로를 index.html로 리다이렉트해야 한다 (try_files).
#
# 보안 헤더:
# - X-Frame-Options: 클릭재킹 방지
# - X-Content-Type-Options: MIME 타입 스니핑 방지
# - X-XSS-Protection: XSS 필터 활성화
# - CSP: 인라인 스크립트만 허용 (외부 스크립트 차단)
# =============================================================================
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅: 존재하지 않는 경로는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱 (JS, CSS, 이미지)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 헬스체크 엔드포인트 (K8s의 liveness/readiness probe가 사용)
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # 불필요한 파일 접근 차단
    location ~ /\. {
        deny all;
    }
}
