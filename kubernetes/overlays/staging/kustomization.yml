# Staging 클러스터 (tart staging-master + staging-worker1)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devsecops

resources:
  - ../../base

labels:
  - pairs:
      environment: staging
      cluster: staging
    includeSelectors: true

patches:
  - target:
      kind: Deployment
      name: dashboard
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: dashboard
    newTag: staging
