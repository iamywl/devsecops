# =============================================================================
# Ansible 설정 파일
#
# Ansible은 설정을 다음 순서로 찾는다 (위가 우선):
# 1. ANSIBLE_CONFIG 환경변수
# 2. ./ansible.cfg (현재 디렉토리)
# 3. ~/.ansible.cfg
# 4. /etc/ansible/ansible.cfg
#
# 이 파일이 infrastructure/ansible/ 에 있으므로,
# 해당 디렉토리에서 ansible-playbook을 실행하면 자동으로 적용된다.
# =============================================================================
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
retry_files_enabled = false
stdout_callback = yaml

# 경고 억제: localhost에 대한 인터프리터 경고 방지
interpreter_python = auto_silent

[privilege_escalation]
become = false
