# =============================================================================
# Service: Pod에 접근하는 안정적인 엔드포인트를 제공한다
#
# Pod는 언제든 죽고 다시 생성될 수 있고, IP도 바뀐다.
# Service는 label selector로 Pod를 찾아서 고정된 DNS 이름과 IP를 제공한다.
#
# Service 타입:
# - ClusterIP (기본): 클러스터 내부에서만 접근 가능
# - NodePort: 노드의 특정 포트로 외부 접근 가능 (개발용)
# - LoadBalancer: 클라우드 LB를 프로비저닝 (프로덕션용)
#
# 접근 방법:
#   클러스터 내부: http://dashboard.dev.svc.cluster.local
#   포트포워딩:    kubectl port-forward svc/dashboard -n dev 8080:80
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  labels:
    app: dashboard
spec:
  type: ClusterIP
  selector:
    app: dashboard   # 이 label을 가진 Pod로 트래픽을 라우팅한다
  ports:
    - name: http
      port: 80         # Service가 수신하는 포트 (클러스터 내부 접근용)
      targetPort: http  # Pod의 포트 (containerPort의 name=http → 8080)
      protocol: TCP
