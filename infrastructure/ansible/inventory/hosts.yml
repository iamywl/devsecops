# =============================================================================
# Ansible 인벤토리: tart VM 10대
#
# tart ip 명령으로 동적 IP를 가져와서 사용한다.
# ./scripts/gen-inventory.sh 로 자동 생성할 수 있다.
#
# SSH 접속: admin / admin (sshpass 사용)
# =============================================================================
all:
  vars:
    ansible_user: admin
    ansible_password: admin
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  children:
    platform:
      hosts:
        platform-master:
        platform-worker1:
        platform-worker2:

    dev:
      hosts:
        dev-master:
        dev-worker1:

    staging:
      hosts:
        staging-master:
        staging-worker1:

    prod:
      hosts:
        prod-master:
        prod-worker1:
        prod-worker2:

    masters:
      hosts:
        platform-master:
        dev-master:
        staging-master:
        prod-master:

    workers:
      hosts:
        platform-worker1:
        platform-worker2:
        dev-worker1:
        staging-worker1:
        prod-worker1:
        prod-worker2:
